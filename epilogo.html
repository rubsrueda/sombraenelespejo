<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epílogo | Abel de Ferro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              night: "#0f172a",
              gold: "#d4af37",
              paper: "#f8fafc",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />

      <nav class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-3 md:px-6" aria-label="Principal">
        <a href="index.html" class="brand-mark">Abel de Ferro</a>
        <button id="mobileMenuBtn" data-i18n="common.menu" class="menu-btn md:hidden" aria-expanded="false" aria-controls="mobileMenu">Menú</button>
        <ul class="hidden items-center gap-2 md:flex">
          <li><a data-i18n="common.nav.home" class="nav-link" href="index.html#top">Inicio</a></li>
          <li><a data-i18n="common.nav.synopsis" class="nav-link" href="index.html#sinopsis">Sinopsis</a></li>
          <li><a data-i18n="common.nav.fullReading" class="nav-link" href="lectura.html">Lectura Completa</a></li>
          <li><a data-i18n="common.nav.epilogue" class="nav-link" href="epilogo.html">Epílogo</a></li>
          <li><a data-i18n="common.nav.reviews" class="nav-link" href="reseñas.html">Reseñas</a></li>
          <li><a data-i18n="common.nav.buy" class="nav-link" href="ventas.html">Comprar</a></li>
          <li><a data-i18n="common.nav.login" class="nav-link" href="login.html">Login</a></li>
        </ul>
      </nav>
      <div id="mobileMenu" class="mx-auto hidden w-full max-w-6xl px-4 pb-4 md:hidden">

        <a data-i18n="common.nav.synopsis" class="mobile-link" href="index.html#sinopsis">Sinopsis</a>
        <a data-i18n="common.nav.fullReading" class="mobile-link" href="lectura.html">Lectura Completa</a>
        <a data-i18n="common.nav.epilogue" class="mobile-link" href="epilogo.html">Epílogo</a>
        <a data-i18n="common.nav.reviews" class="mobile-link" href="reseñas.html">Reseñas</a>
        <a data-i18n="common.nav.buy" class="mobile-link" href="ventas.html">Comprar</a>
        <a data-i18n="common.nav.login" class="mobile-link" href="login.html">Login</a>
      </div>
    </header>

    <main class="mx-auto w-full max-w-6xl px-4 pb-16 pt-10 md:px-6">
      <section class="content-card card-reveal">
        <p data-i18n="pages.epilogo.eyebrow" class="eyebrow">Cierre de obra</p>
        <h1 data-i18n="pages.epilogo.heading" class="book-h1 mb-2">Epílogo</h1>
        <p data-i18n="pages.epilogo.autoLoad" class="mb-5 text-slate-600">Cargado automáticamente desde el manuscrito principal.</p>

        <article>
          <h2 id="epilogueTitle" data-i18n="pages.epilogo.loading" class="section-title">Cargando epílogo...</h2>
          <div id="epilogueBody" class="whitespace-pre-wrap text-justify"></div>
        </article>
      </section>

    <script type="module" src="i18n-init.js"></script>
    <script src="main.js"></script>
