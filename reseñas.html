<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reseñas | Abel de Ferro</title>
    <meta name="description" content="Reseñas de lectores de Sombra en el Espejo con publicación en tiempo real." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://rubsrueda.github.io/sombraenelespejo/rese%C3%B1as.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Reseñas | Sombra en el Espejo" />
    <meta property="og:description" content="Comunidad de lectores y opiniones verificadas." />
    <meta property="og:url" content="https://rubsrueda.github.io/sombraenelespejo/rese%C3%B1as.html" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              night: "#0f172a",
              gold: "#d4af37",
              paper: "#f8fafc",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="reviews" class="site-bg text-slate-800">
    <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-paper/90 backdrop-blur">
      <nav class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-3 md:px-6" aria-label="Principal">
        <a href="index.html" class="brand-mark">Abel de Ferro</a>
        <button id="mobileMenuBtn" data-i18n="common.menu" class="menu-btn md:hidden" aria-expanded="false" aria-controls="mobileMenu">Menú</button>
        <ul class="hidden items-center gap-2 md:flex">
          <li><a class="nav-link" href="index.html">Inicio</a></li>
          <li><a class="nav-link" href="autor.html">Autor</a></li>
          <li><a class="nav-link" href="ventas.html">Libros</a></li>
          <li><a class="nav-link" href="reseñas.html">Resenas</a></li>
          <li><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </nav>
      <div id="mobileMenu" class="mx-auto hidden w-full max-w-6xl px-4 pb-4 md:hidden">
        <a class="mobile-link" href="index.html">Inicio</a>
        <a class="mobile-link" href="autor.html">Autor</a>
        <a class="mobile-link" href="ventas.html">Libros</a>
        <a class="mobile-link" href="reseñas.html">Resenas</a>
        <a class="mobile-link" href="login.html">Login</a>
      </div>
    </header>

    <main class="mx-auto grid w-full max-w-6xl gap-6 px-4 pb-16 pt-10 md:grid-cols-[1fr_1.2fr] md:px-6">
      <section class="form-card card-reveal h-fit">
        <h1 data-i18n="pages.reviews.heading" class="book-h1 mb-2">Sistema de Reseñas</h1>
        <p data-i18n="pages.reviews.intro" class="mb-4">Solo usuarios autenticados pueden enviar reseñas.</p>
        <div id="authNotice" class="notice mb-4">
          <span data-i18n="pages.reviews.authChecking">Verificando autenticación...</span>
        </div>

        <form id="reviewForm" class="grid gap-3" aria-label="Formulario de reseñas">
          <div>
            <label data-i18n="pages.reviews.name" for="reviewName">Nombre</label>
            <input id="reviewName" name="reviewName" type="text" required maxlength="50" />
          </div>
          <div>
            <label data-i18n="pages.reviews.rating" for="reviewRating">Valoración</label>
            <select id="reviewRating" name="reviewRating" required>
              <option data-i18n="pages.reviews.star5" value="5">5 estrellas</option>
              <option data-i18n="pages.reviews.star4" value="4">4 estrellas</option>
              <option data-i18n="pages.reviews.star3" value="3">3 estrellas</option>
              <option data-i18n="pages.reviews.star2" value="2">2 estrellas</option>
              <option data-i18n="pages.reviews.star1" value="1">1 estrella</option>
            </select>
          </div>
          <div>
            <label data-i18n="pages.reviews.comment" for="reviewComment">Comentario</label>
            <textarea id="reviewComment" name="reviewComment" required maxlength="600"></textarea>
          </div>
          <button data-i18n="pages.reviews.submit" type="submit" id="submitReviewBtn" class="btn-main btn-interact">Publicar reseña</button>
        </form>
        <p id="reviewFeedback" class="mt-3 text-sm text-slate-600"></p>
      </section>

      <section class="grid gap-3">
        <article class="form-card card-reveal delay-1">
          <h2 data-i18n="pages.reviews.realtimeTitle" class="section-title">Reseñas en tiempo real</h2>
          <p data-i18n="pages.reviews.realtimeBody">Conectadas con Supabase.</p>
        </article>
        <div id="reviewsList" class="grid gap-3"></div>
      </section>
    </main>

    <script type="module" src="i18n-init.js"></script>
    <script type="module" src="main.js"></script>
    <script type="module" src="reviews.js"></script>
  </body>
</html>
