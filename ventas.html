<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comprar | Abel de Ferro</title>
    <meta name="description" content="Compra Sombra en el Espejo en EUR, USD o MXN. Pago seguro y acceso al contenido completo." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://rubsrueda.github.io/sombraenelespejo/ventas.html" />
    <meta property="og:type" content="product" />
    <meta property="og:title" content="Comprar Sombra en el Espejo" />
    <meta property="og:description" content="Compra oficial del libro Sombra en el Espejo." />
    <meta property="og:url" content="https://rubsrueda.github.io/sombraenelespejo/ventas.html" />
    <meta name="twitter:card" content="summary" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              night: "#0f172a",
              gold: "#d4af37",
              paper: "#f8fafc",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="ventas" class="site-bg text-slate-800">
    <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-paper/90 backdrop-blur">
      <nav class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-3 md:px-6" aria-label="Principal">
        <a href="autor.html" class="brand-mark">Abel de Ferro</a>
        <button id="mobileMenuBtn" data-i18n="common.menu" class="menu-btn md:hidden" aria-expanded="false" aria-controls="mobileMenu">Menú</button>
        <ul class="hidden items-center gap-2 md:flex">
          <li><a class="nav-link" href="index.html">Inicio</a></li>
          <li><a class="nav-link" href="autor.html">Autor</a></li>
          <li><a class="nav-link" href="ventas.html">Libros</a></li>
          <li><a class="nav-link" href="reseñas.html">Resenas</a></li>
          <li><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </nav>
      <div id="mobileMenu" class="mx-auto hidden w-full max-w-6xl px-4 pb-4 md:hidden">
        <a class="mobile-link" href="index.html">Inicio</a>
        <a class="mobile-link" href="autor.html">Autor</a>
        <a class="mobile-link" href="ventas.html">Libros</a>
        <a class="mobile-link" href="reseñas.html">Resenas</a>
        <a class="mobile-link" href="login.html">Login</a>
      </div>
    </header>

    <main class="mx-auto w-full max-w-6xl px-4 pb-16 pt-10 md:px-6">
      <section class="sales-card card-reveal">
        <p data-i18n="pages.ventas.eyebrow" class="eyebrow">Compra oficial</p>
        <h1 id="productTitle" data-i18n="pages.ventas.loadingProduct" class="book-h1 mb-4">Cargando producto...</h1>
        <p id="productSubtitle"></p>
        <div id="accessStatus" class="notice mt-4 hidden"></div>
      </section>

      <section class="mt-6 grid gap-4 md:grid-cols-3" id="benefitsGrid"></section>

      <section id="buySection" class="mt-6 content-card card-reveal delay-2">
        <h2 data-i18n="pages.ventas.buyBook" class="section-title">Compra del Libro</h2>
        <p data-i18n="pages.ventas.buyBookLead" class="mb-4">Hay un único libro activo en este momento, con arquitectura lista para ampliar catálogo.</p>
        <div id="productTiers" class="grid gap-4 md:grid-cols-1"></div>
      </section>

      <section class="mt-6 sales-card card-reveal delay-3">
        <h2 data-i18n="pages.ventas.transparency" class="section-title">Aviso de Transparencia</h2>
        <p id="salesTransparencyText"></p>
      </section>

    </main>

    <script type="module" src="i18n-init.js"></script>
    <script type="module" src="main.js"></script>
    <script type="module" src="ventas-producto.js"></script>
  </body>
</html>
