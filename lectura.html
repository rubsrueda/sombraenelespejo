<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lectura | Abel de Ferro</title>
    <meta name="description" content="Lee Sombra en el Espejo. Acceso completo con compra activa." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://rubsrueda.github.io/sombraenelespejo/lectura.html" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="Lectura | Sombra en el Espejo" />
    <meta property="og:description" content="Lee el libro completo cuando tu acceso esté activo." />
    <meta property="og:url" content="https://rubsrueda.github.io/sombraenelespejo/lectura.html" />
    <link rel="stylesheet" href="tailwind.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .tab-btn {
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        white-space: nowrap;
        transition: all 220ms ease;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        color: #64748b;
      }
      .tab-btn.active {
        border-bottom-color: #d4af37;
        color: #0f172a;
        font-weight: 600;
      }
      .tab-btn:not(.active) {
        color: #64748b;
      }
      .tab-btn:hover {
        color: #0f172a;
      }
    </style>
  </head>
  <body data-page="lectura" class="site-bg text-slate-800">
    <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-paper/90 backdrop-blur">
      <nav class="mx-auto flex w-full max-w-4xl items-center justify-between px-4 py-3 md:px-6" aria-label="Principal">
        <a href="autor.html" class="brand-mark">Abel de Ferro</a>
        <button id="mobileMenuBtn" data-i18n="common.menu" class="menu-btn md:hidden" aria-expanded="false" aria-controls="mobileMenu">Menú</button>
        <ul class="hidden items-center gap-2 md:flex">
          <li><a class="nav-link" href="index.html">Inicio</a></li>
          <li><a class="nav-link" href="autor.html">Autor</a></li>
          <li><a class="nav-link" href="libros.html">Libros</a></li>
          <li><a class="nav-link" href="reseñas.html">Resenas</a></li>
          <li><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </nav>
      <div id="mobileMenu" class="mx-auto hidden w-full max-w-4xl px-4 pb-4 md:hidden">
        <a class="mobile-link" href="index.html">Inicio</a>
        <a class="mobile-link" href="autor.html">Autor</a>
        <a class="mobile-link" href="libros.html">Libros</a>
        <a class="mobile-link" href="reseñas.html">Resenas</a>
        <a class="mobile-link" href="login.html">Login</a>
      </div>
    </header>

    <main class="mx-auto w-full max-w-4xl px-4 pb-16 pt-6 md:px-6">
      <!-- Encabezado con título y descripción -->
      <section class="content-card card-reveal">
        <h1 id="bookTitle" class="book-h1 mb-3"></h1>
        <p id="bookDescription" class="text-base leading-relaxed"></p>
        <div id="readingAccessStatus" class="notice mt-4"></div>
      </section>

      <!-- Navegación por tabs -->
      <nav id="contentNav" class="mt-8 flex gap-2 overflow-x-auto border-b border-slate-200 pb-2" aria-label="Secciones">
        <!-- Los tabs se generan dinámicamente en lectura.js -->
      </nav>

      <!-- Contenido dinámico (una sección a la vez) -->
      <section id="contentPanel" class="mt-6 content-card card-reveal">
        <!-- El contenido de la sección activa aparece aquí -->
        <div id="sectionContent" class="reading-host"></div>
      </section>

      <!-- Panel de acceso bloqueado (solo si no tiene acceso) -->
      <section id="lockedPanel" class="mt-6 content-card card-reveal hidden">
        <h2 data-i18n="pages.lectura.lockedTitle" class="section-title">Acceso no habilitado</h2>
        <p data-i18n="pages.lectura.lockedBody" class="mb-4">
          Para desbloquear el libro completo, realiza la compra y vuelve a esta sección.
        </p>
        <div id="catalogList" class="catalog-mini mb-4"></div>
        <a id="lockedBuyLink" data-i18n="common.actions.goToBuy" href="ventas.html" class="btn-main btn-interact inline-flex">Ir a Comprar</a>
      </section>
    </main>

    <!-- Controles de audio flotantes globales (fuera de main para que sean realmente sticky) -->
    <div id="audioBookControls" class="audiobook-controls-floating" role="group" aria-label="Controles de audiolibro">
      <button id="audioPlayBtn" type="button" class="btn-main btn-interact">Escuchar</button>
      <button id="audioPauseBtn" type="button" class="btn-secondary btn-interact">Pausar</button>
      <button id="audioStopBtn" type="button" class="btn-danger btn-interact">Detener</button>
      <p id="audioBookStatus" class="audiobook-status" aria-live="polite">Narración lista.</p>
    </div>

    <script type="module" src="i18n-init.js"></script>
    <script type="module" src="main.js"></script>
    <script type="module" src="lectura.js"></script>
  </body>
</html>
