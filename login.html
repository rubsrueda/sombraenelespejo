<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Abel de Ferro</title>
    <meta name="description" content="Inicia sesión en Sombra en el Espejo con email o acceso social para comunidad y contenido." />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://rubsrueda.github.io/sombraenelespejo/login.html" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              night: "#0f172a",
              gold: "#d4af37",
              paper: "#f8fafc",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="supabase-client.js"></script>
    <script type="module" src="auth-supabase.js"></script>
  </head>
  <body data-page="login" class="site-bg text-slate-800">
    <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-paper/90 backdrop-blur">
      <nav class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-3 md:px-6" aria-label="Principal">
        <a href="index.html" class="brand-mark">Abel de Ferro</a>
        <button id="mobileMenuBtn" data-i18n="common.menu" class="menu-btn md:hidden" aria-expanded="false" aria-controls="mobileMenu">Menú</button>
        <ul class="hidden items-center gap-2 md:flex">
          <li><a class="nav-link" href="index.html">Inicio</a></li>
          <li><a class="nav-link" href="autor.html">Autor</a></li>
          <li><a class="nav-link" href="ventas.html">Libros</a></li>
          <li><a class="nav-link" href="reseñas.html">Resenas</a></li>
          <li><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </nav>
      <div id="mobileMenu" class="mx-auto hidden w-full max-w-6xl px-4 pb-4 md:hidden">
        <a class="mobile-link" href="index.html">Inicio</a>
        <a class="mobile-link" href="autor.html">Autor</a>
        <a class="mobile-link" href="ventas.html">Libros</a>
        <a class="mobile-link" href="reseñas.html">Resenas</a>
        <a class="mobile-link" href="login.html">Login</a>
      </div>
    </header>


    <main class="mx-auto w-full max-w-md px-4 pb-16 pt-10 md:px-0 flex flex-col items-center justify-center min-h-[80vh]">
      <section class="form-card card-reveal w-full shadow-xl">
        <h1 data-i18n="pages.login.heading" class="book-h1 mb-2 text-center">Acceso de Lectores</h1>
        <p data-i18n="pages.login.intro" class="mb-4 text-center">Inicia sesión para publicar reseñas y participar en la comunidad.</p>

        <div id="loginNotice" data-i18n="pages.login.notice" class="notice mb-4 text-center">
          Si no tienes cuenta, puedes registrarte con email y contraseña.
        </div>

        <div class="mb-6 flex flex-col gap-3">
          <button id="googleLoginBtn" data-i18n="pages.login.google" class="btn-main btn-interact flex items-center justify-center gap-2" type="button">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google" class="h-5 w-5" />
            Entrar con Google
          </button>
          <button id="facebookLoginBtn" class="btn-secondary btn-interact flex items-center justify-center gap-2" type="button">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg" alt="Facebook" class="h-5 w-5" />
            Entrar con Facebook
          </button>
          <button id="xLoginBtn" class="btn-secondary btn-interact flex items-center justify-center gap-2" type="button">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.53 2.477h3.934l-8.59 9.81 10.12 13.236h-7.96l-6.23-8.19-7.13 8.19H.74l9.16-10.47L0 2.477h8.09l5.44 7.18 6.13-7.18zm-1.36 18.13h2.18L7.1 4.36H4.8l11.37 16.247z"/></svg>
            Entrar con X
          </button>
          <div class="flex flex-row gap-2 justify-center">
            <button id="tiktokOriginBtn" class="btn-secondary btn-interact px-3 py-1 text-xs" type="button">Vengo de TikTok</button>
            <button id="redditOriginBtn" class="btn-secondary btn-interact px-3 py-1 text-xs" type="button">Vengo de Reddit</button>
          </div>
          <button id="logoutBtn" data-i18n="pages.login.logout" class="btn-danger btn-interact w-full" type="button">Cerrar sesión</button>
        </div>

        <form id="emailAuthForm" class="grid gap-3">
          <div>
            <label data-i18n="pages.login.email" for="userEmail">Email</label>
            <input id="userEmail" type="email" required autocomplete="username" />
          </div>
          <div>
            <label data-i18n="pages.login.password" for="userPassword">Contraseña</label>
            <input id="userPassword" type="password" required minlength="6" autocomplete="current-password" />
          </div>
          <div class="flex flex-col md:flex-row gap-3">
            <button id="emailLoginBtn" data-i18n="pages.login.loginEmail" class="btn-secondary btn-interact w-full" type="button">Entrar con Email</button>
            <button id="emailRegisterBtn" data-i18n="pages.login.createAccount" class="btn-main btn-interact w-full" type="button">Crear cuenta</button>
          </div>
          <div class="mt-2 text-center">
            <button id="resetPasswordBtn" data-i18n="pages.login.forgot" class="btn-link text-xs text-blue-700 hover:underline" type="button">¿Olvidaste tu contraseña?</button>
          </div>
        </form>

        <p id="authFeedback" class="mt-3 text-sm text-center text-slate-600"></p>
        <p class="mt-3 text-sm text-center text-slate-700">
          Acceso interno: <a href="admin-afiliados.html" class="underline">Panel admin de afiliados</a>
        </p>
      </section>
    </main>

    <script type="module" src="i18n-init.js"></script>
    <script type="module" src="main.js"></script>
    <script type="module" src="login.js"></script>
  </body>
</html>
